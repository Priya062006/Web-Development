<!DOCTYPE html>
<html>
<head>
    <title>Multiple Iframes Example</title>
</head>
<body>

    <h2>Example of Multiple Iframes</h2>

    <!-- First Frame -->
    <iframe src="https://www.example.com"
            width="1400"
            height="500"
            title="Example Site">
    </iframe>

    <!-- Second Frame -->
    <iframe src="https://www.wikipedia.org"
            width="1400"
            height="500"
            title="Wikipedia">
    </iframe>

    <br><br>

    <!-- Third Frame -->
    <iframe src="https://www.openai.com"
            width="1400"
            height="500"
            title="OpenAI">
    </iframe>

</body>
</html>
